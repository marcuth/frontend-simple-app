version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3333:3333"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3333}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    # Optional: use a .env file for environment variables
    # env_file:
    #   - .env
